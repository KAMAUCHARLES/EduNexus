{% extends "base.html" %}
{% block title %}Add Exam{% endblock %}
{% block page_title %}Create Exam{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('exams') }}" class="btn btn-ghost"><i class="fa-solid fa-arrow-left"></i> Back</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
  <div class="card-body">
    <form method="POST">
      <div class="form-grid" style="margin-bottom:20px;">
        <div class="form-group" style="grid-column:span 2"><label class="form-label">Exam Name *</label><input type="text" name="name" class="form-control" required placeholder="e.g. Term 1 End-Term Examination 2024"></div>
        <div class="form-group"><label class="form-label">Term *</label>
          <select name="term" class="form-control" required><option>Term 1</option><option>Term 2</option><option>Term 3</option></select>
        </div>
        <div class="form-group"><label class="form-label">Year *</label><input type="number" name="year" class="form-control" value="2024" required></div>
        <div class="form-group"><label class="form-label">Exam Type *</label>
          <select name="exam_type" class="form-control" required><option>CAT</option><option>Mid-Term</option><option>End-Term</option><option>Mock</option></select>
        </div>
        <div class="form-group"><label class="form-label">Stream (optional)</label>
          <select name="stream_id" class="form-control"><option value="">All Streams</option>{% for s in streams %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select>
        </div>
        <div class="form-group"><label class="form-label">Start Date</label><input type="date" name="start_date" class="form-control"></div>
        <div class="form-group"><label class="form-label">End Date</label><input type="date" name="end_date" class="form-control"></div>
      </div>
      <button type="submit" class="btn btn-primary"><i class="fa-solid fa-file-pen"></i> Create Exam</button>
    </form>
  </div>
</div>
{% endblock %}
