{% extends "base.html" %}
{% block title %}Add Subject{% endblock %}
{% block page_title %}Add Subject{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('subjects') }}" class="btn btn-ghost"><i class="fa-solid fa-arrow-left"></i> Back</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:560px">
  <div class="card-body">
    <form method="POST">
      <div class="form-grid" style="margin-bottom:16px">
        <div class="form-group"><label class="form-label">Subject Name *</label><input type="text" name="name" class="form-control" required placeholder="e.g. Mathematics"></div>
        <div class="form-group"><label class="form-label">Code *</label><input type="text" name="code" class="form-control" required placeholder="e.g. MAT" maxlength="10"></div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select name="category" class="form-control">
            <option>Sciences</option><option>Languages</option><option>Humanities</option><option>Technical</option><option>Commercial</option>
          </select>
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <label class="form-label">&nbsp;</label>
          <div class="form-check">
            <input type="checkbox" id="comp" name="is_compulsory" checked>
            <label for="comp">Compulsory Subject</label>
          </div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add Subject</button>
    </form>
  </div>
</div>
{% endblock %}
