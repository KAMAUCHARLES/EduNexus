{% extends "base.html" %}
{% block title %}Add Stream{% endblock %}
{% block page_title %}Add Stream{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('streams') }}" class="btn btn-ghost"><i class="fa-solid fa-arrow-left"></i> Back</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-body">
    <form method="POST">
      <div class="form-grid" style="margin-bottom:18px">
        <div class="form-group"><label class="form-label">Stream Name *</label><input type="text" name="name" class="form-control" required placeholder="e.g. Form 1 A"></div>
        <div class="form-group">
          <label class="form-label">Grade *</label>
          <select name="grade" class="form-control" required><option>Form 1</option><option>Form 2</option><option>Form 3</option><option>Form 4</option></select>
        </div>
        <div class="form-group"><label class="form-label">Capacity</label><input type="number" name="capacity" class="form-control" value="45" min="1" max="100"></div>
        <div class="form-group">
          <label class="form-label">Class Teacher</label>
          <select name="class_teacher_id" class="form-control">
            <option value="">Unassigned</option>
            {% for t in teachers %}<option value="{{ t.id }}">{{ t.full_name }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Create Stream</button>
    </form>
  </div>
</div>
{% endblock %}
