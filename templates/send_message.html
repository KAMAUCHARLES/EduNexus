{% extends "base.html" %}
{% block title %}Send Message{% endblock %}
{% block page_title %}New Message{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('messages') }}" class="btn btn-ghost"><i class="fa-solid fa-arrow-left"></i> Back</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:640px">
  <div class="card-header"><div class="card-title">Compose Message</div></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid" style="margin-bottom:16px">
        <div class="form-group" style="grid-column:span 2">
          <label class="form-label">To *</label>
          <select name="recipient_id" class="form-control" required>
            <option value="">Select Recipient...</option>
            {% for u in users %}<option value="{{ u.id }}" {% if request.args.get('reply_to')==u.id|string %}selected{% endif %}>{{ u.full_name }} ({{ u.role|title }})</option>{% endfor %}
          </select>
        </div>
        <div class="form-group" style="grid-column:span 2">
          <label class="form-label">Subject *</label>
          <input type="text" name="subject" class="form-control" required placeholder="Message subject...">
        </div>
        <div class="form-group" style="grid-column:span 2">
          <label class="form-label">Message *</label>
          <textarea name="body" class="form-control" rows="7" required placeholder="Type your message here..."></textarea>
        </div>
      </div>
      <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> Send Message</button>
    </form>
  </div>
</div>
{% endblock %}
