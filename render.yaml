services:
  - type: web
    name: edunexus
    runtime: python

    buildCommand: |
      apt-get update && apt-get install -y wkhtmltopdf
      pip install -r requirements.txt

    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app

    envVars:
      - key: GROQ_API_KEY
        sync: false

      - key: PYTHON_VERSION
        value: 3.11.9

    disk:
      name: edunexus-data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1