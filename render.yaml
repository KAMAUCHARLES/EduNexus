services:
  - type: web
    name: edunexus
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: GROQ_API_KEY
        sync: false   # You'll paste this in the Render dashboard
    disk:
      name: edunexus-data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
